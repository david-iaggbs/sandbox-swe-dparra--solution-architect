name: ADR Management

# Fires automatically when the 'adr' label is applied to an issue.
# Using 'labeled' ensures exactly one execution per ADR issue,
# even when the label is set at creation time.
on:
  issues:
    types: [labeled]

jobs:
  manage:
    name: Execute ADR decisions and close originating epic
    if: github.event.label.name == 'adr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run ADR Management
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GH_TOKEN must be a PAT with repo scope across the david-iaggbs org
          # so Claude can scaffold repos, close issues, and commit ADR files.
          github_token: ${{ secrets.GH_TOKEN }}
          # Pre-authorize Bash and WebFetch at settings level so Claude does not
          # ask for per-call approval. Written to ~/.claude/settings.json before run.
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "WebFetch(*)"],
                "deny": []
              }
            }
          prompt: |
            An issue has just been labeled as an ADR in this repository.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}
            URL: ${{ github.event.issue.html_url }}

            Execute the full ADR Management Process below.
            Execute every step automatically — do not wait for confirmation.
            If any step fails, post a failure comment on this issue and stop immediately.
            Do NOT close the originating epic if any execution step fails.

            ---

            ## Step 1 — Parse the ADR issue

            Read the issue body in full.
            Extract the following fields from the metadata table and body sections:
            - **Originating Epic URL** — from the `| **Originating Epic** |` row
            - **Categories** — from the `| **Categories** |` row
            - **Decision** — the "We will..." statement from the `## Decision` section
            - **Follow-up actions** — the checklist items under `## Consequences` → `**Follow-up actions:**`

            Also read:
            - `adr/README.md` — for ADR numbering conventions and the index format
            - `adr/template.md` — for the canonical ADR file structure
            - `README.md` — for the Product Registry (Registered Products table) and naming conventions

            ---

            ## Step 2 — Decompose the use case

            Before executing any structural action, produce a complete architecture design
            for the use case described in this ADR.

            Read the decompose-usecase skill from disk:
            ```bash
            cat .claude/skills/decompose-usecase/SKILL.md
            ```

            Use the following as the use case input for the analysis:
            - **Decision** extracted in Step 1 — the "We will..." statement
            - **Context** section of the ADR issue body — why this decision was needed
            - **Follow-up actions** — the specific components or changes required

            Execute the full analysis as described in the skill:
            1. Identify bounded contexts, entities, user workflows, and data ownership
            2. Define every backend service (name, REST endpoints, events, DB schema)
            3. Define every web UI component (pages, BFF routes, SSM config, ALB priority)
            4. Map event flows between services
            5. Produce the repository plan (one repo per service/UI)
            6. Map UI-to-backend integrations
            7. Define ALB routing strategy and configuration management

            Store the full decomposition output — it is the source of truth for Step 3.

            ---

            ## Step 3 — Execute decisions

            Using the architecture plan produced in Step 2, execute the required structural
            actions. For each component in the plan, first check whether its repo already exists.

            **IMPORTANT — existence check before every repo action:**
            Use the GitHub API to check existence. A 200 response means the repo already
            exists and must be treated as SUCCESS (not an error). Only attempt creation on 404.
            ```bash
            gh api repos/david-iaggbs/<repo-name> --silent && echo "EXISTS" || echo "NOT_FOUND"
            ```

            **DO NOT invoke `/scaffold-design`, `/scaffold-infra`, `/scaffold-microservice`,
            or `/scaffold-webui` as slash commands** — those require the interactive Claude Code
            CLI and are unavailable in this runner context.

            Instead, **read the skill file for the required category directly from disk** and
            execute its instructions step by step using `gh` CLI and `git`:

            ```bash
            cat .claude/skills/scaffold-design/SKILL.md
            ```

            Category → skill file mapping:

            | Category | Skill file | Mode argument |
            |----------|------------|---------------|
            | `product` | `.claude/skills/scaffold-design/SKILL.md` | `scaffold <product-name>` |
            | `infra` | `.claude/skills/scaffold-infra/SKILL.md` | `<product-name>` |
            | `service` | `.claude/skills/scaffold-microservice/SKILL.md` | `<spec from Step 2 plan>` |
            | `ui` | `.claude/skills/scaffold-webui/SKILL.md` | `<spec from Step 2 plan>` |

            ### 3a — New product (repo does NOT exist)

            For each component whose repo returns NOT_FOUND:
            1. Read the corresponding SKILL.md with `cat .claude/skills/<skill>/SKILL.md`
            2. Locate the correct mode section (SCAFFOLD MODE / INFRA MODE / etc.)
            3. Execute every step in that section using `gh` and `git` directly
            4. Derive all values from the Step 2 decomposition — do NOT prompt for input
            5. Document the result (repo URL created)

            ### 3b — Existing product (repo already EXISTS)

            For each component whose repo already exists, **do not scaffold** — instead,
            create a GitHub issue in that component repo describing the required change,
            derived from the Step 2 architecture plan.

            Use `gh issue create` with the appropriate template label:

            | Repo type | Label |
            |-----------|-------|
            | `--design` repo | `specification` |
            | `--infra` repo | `infrastructure`, `cdk` |
            | `--service` repo | `task` |
            | `--ui` repo | `task` |

            Every issue body must include:
            - **Originating Epic**: URL of the epic issue (from Step 1)
            - **Initiative**: product name
            - **Context**: why this change is needed (from ADR Decision + Step 2 analysis)
            - **Technical Specification**: concrete implementation detail from the Step 2 plan
              (endpoints, entities, event flows, BFF routes, SSM params, ALB priorities — never vague)
            - **Acceptance Criteria**: at least 3 verifiable, checkable conditions

            ### 3c — Populate the design repo with the architecture (applies to BOTH 3a and 3b)

            After scaffolding (3a) or confirming existence (3b), the `--design` repo must be
            updated to reflect the full architecture produced in Step 2. This is mandatory
            regardless of whether the repo was just created or already existed.

            Read the scaffold-design skill for the update-section mode:
            ```bash
            cat .claude/skills/scaffold-design/SKILL.md
            ```

            Clone (or reuse the already-cloned) design repo:
            ```bash
            DESIGN_REPO="sandbox-swe-dparra--<product-name>--design"
            DESIGN_DIR="/tmp/$DESIGN_REPO"
            rm -rf "$DESIGN_DIR"
            gh repo clone david-iaggbs/$DESIGN_REPO "$DESIGN_DIR"
            cd "$DESIGN_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            ```

            Then update each mandatory arc42 section with the content derived from the
            Step 2 decomposition. For every section, read the current file first, then
            write the updated content using the Step 2 plan as the source of truth:

            | Section file | Content to write from Step 2 |
            |---|---|
            | `Documents/01-requirements.md` | Functional requirements (use case goals, user stories), quality goals (availability, latency, scalability targets) |
            | `Documents/02-constraints.md` | Architecture constraints: ECS Fargate only, allowed AWS services, forbidden patterns (no Lambda, no direct HTTP between services, database-per-service) |
            | `Documents/03-context-scope.md` | System boundary, external actors (users, external systems), a Mermaid `graph LR` C1 diagram showing the product and its external dependencies |
            | `Documents/04-solution-strategy.md` | Key architectural decisions, service decomposition rationale, technology choices justified by Step 2 analysis, a Mermaid `graph TB` C2 container diagram |
            | `Documents/05-building-blocks.md` | Service catalog table (name, bounded context, REST endpoints, events, DB), a Mermaid `graph TB` C3 component diagram per service |
            | `Documents/06-runtime-view.md` | Event flow sequences from Step 2, one `sequenceDiagram` per main user workflow (e.g., game started, move submitted, game completed) |
            | `Documents/07-deployment-view.md` | ECS Fargate cluster topology, ALB routing table, VPC layout, a Mermaid `graph TB` deployment diagram |

            Rules for writing section content:
            - Replace ALL placeholder text (`{...}`, `TBD`, empty sections) with real content from Step 2
            - Keep the arc42 section headings and structure intact — only fill in the content
            - Mermaid diagrams must use the existing workspace colour palette and node notation
            - Do NOT update draw.io files automatically — note them as manual steps in CHANGELOG.md

            Commit all updated sections in a single commit:
            ```bash
            git add Documents/
            git commit -m "docs: populate arc42 sections from Step 2 architecture decomposition

            Sections updated: 01-requirements, 02-constraints, 03-context-scope,
            04-solution-strategy, 05-building-blocks, 06-runtime-view, 07-deployment-view

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
            ```

            For `org`, `initiative`, `data`, `integration`, `security` categories:
            update templates, documentation, or README.md as described in the Follow-up actions.

            ---

            ## Step 4 — Validate execution

            For every action executed in Step 3, verify it completed successfully:
            - For scaffolded repos: confirm with `gh repo view david-iaggbs/<repo>`
            - For README.md product registrations: confirm the row exists in the file
            - For created issues: confirm the issue URL is reachable

            If ANY validation fails:
            1. Post a comment on this ADR issue:
               `## ❌ ADR Execution Failed\n\nStep: <description>\nError: <details>\n\nThe originating epic will NOT be closed until all actions are validated.`
            2. Stop — do not proceed to Steps 5–8

            ---

            ## Step 5 — Formalize the ADR file

            Determine the next ADR number by listing existing ADR files:
            ```
            gh api repos/david-iaggbs/sandbox-swe-dparra--solution-architect/contents/adr \
              --jq '[.[] | select(.name | test("^[0-9]{4}")) | .name] | sort | last // "0000"'
            ```
            Increment by 1 and zero-pad to 4 digits (e.g., `0001`).

            Create the file `adr/NNNN-<kebab-case-title>.md` using `adr/template.md` as the base.
            Populate all fields from the issue body. Set `| **Status** | Accepted |`.

            Then update the ADR index table in `adr/README.md`:
            Add a new row: `| [ADR-NNNN](NNNN-<slug>.md) | <Title> | Accepted | <Categories> | <Date> |`

            Commit both files directly to `main`:
            - Use `git config user.name "github-actions[bot]"` and `git config user.email "github-actions[bot]@users.noreply.github.com"`
            - Commit message: `docs(adr): accept NNNN — <title>`

            ---

            ## Step 6 — Link epic to ADR

            Using the **Originating Epic URL** extracted in Step 1, post a comment on that epic issue:

            ```
            ## ADR Accepted — ADR-NNNN: <title>

            The architectural decision for this epic has been formalized and all actions executed.

            **ADR file:** `adr/NNNN-<slug>.md`
            **Decision:** <decision statement>

            **Architecture decomposition:** <one-paragraph summary from Step 2>

            **Actions executed:**
            - <action 1 with result URL or issue URL>
            - <action 2 with result URL or issue URL>
            - ...

            This epic will be closed as all work has been delegated to component repos and the ADR has been accepted.
            ```

            ---

            ## Step 7 — Close the originating epic(s)

            Extract the epic issue number from the Originating Epic URL.
            Close the epic with a reason comment:
            ```
            gh issue close <epic-number> \
              --repo david-iaggbs/sandbox-swe-dparra--solution-architect \
              --comment "Closed: ADR-NNNN accepted and all decisions executed. See adr/NNNN-<slug>.md."
            ```

            ---

            ## Step 8 — Close this ADR issue

            Post a final summary comment on this issue (#${{ github.event.issue.number }}):

            ```
            ## ✅ ADR Management Complete

            **ADR file:** `adr/NNNN-<slug>.md` (Status: Accepted)
            **Originating epic:** <url> — closed
            **Actions executed:** <count> action(s) completed and validated

            | Action | Type | Result |
            |--------|------|--------|
            | <component> | scaffolded / issue created | <url> |
            ```

            Then close this issue:
            ```
            gh issue close ${{ github.event.issue.number }} \
              --repo david-iaggbs/sandbox-swe-dparra--solution-architect \
              --comment "ADR formalized as adr/NNNN-<slug>.md. Originating epic closed."
            ```

          additional_permissions: |
            actions: read
